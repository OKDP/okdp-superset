apiVersion: v1
kind: Secret
metadata:
  name: {{ template "okdp.superset.fullname" . }}-trino-oauth2-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "okdp.superset.labels" . | nindent 4 }}
type: Opaque
stringData:
  TRINO_OAUTH_ENABLED: {{ .Values.okdp.trino.oauth.enabled | quote }}
  {{- if .Values.okdp.trino.oauth.enabled }}
  {{- with .Values.okdp.trino.oauth }}
  {{- if .base_url }}
  TRINO_AUTH_OAUTH_BASE_URL: {{ .base_url | quote }}
  {{- end }}
  {{- if .client_id }}
  TRINO_OAUTH_CLIENT_ID: {{ .client_id | quote }}
  {{- end }}
  {{- if .client_secret }}
  TRINO_OAUTH_CLIENT_SECRET: {{ .client_secret | quote }}
  {{- end }}
  {{- if .provider }}
  TRINO_OAUTH_PROVIDER: {{ .provider | quote }}
  {{- end }}
  {{- if .scope }}
  TRINO_OAUTH_SCOPE: {{ .scope | quote }}
  {{- end }}
  {{- end }}
  {{- with (first .Values.superset.ingress.hosts) }}
  SUPERSET_DOMAIN: {{ . | quote }}
  {{- end }}
  {{- end }}
