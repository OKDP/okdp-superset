name: ci 

on:
  workflow_call:
    inputs:
      image:
        description: Image name
        required: false
        type: string
        default: 'superset'
      skip_chart_test:
        description: Whether to deploy and test the chart
        required: false
        type: boolean
        default: false
      ci_registry:
        description: "The registry used to push ci images"
        required: false
        type: string
        default: "ghcr.io"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:

  helm-lint:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Repo ⚡️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      
      - name: Setup helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.15.1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@e6669bcd63d7cb57cb4380c33043eebe5d111992 # v2.6.1
  
      - name: Run chart-testing (list-changed) ✅
        id: list-changed
        run: |
            changed=$(ct list-changed --config .ct.yml)
            if [[ -n "$changed" ]]; then
              echo "list_changed=$(echo ${changed} | tr -d \')" >> "$GITHUB_OUTPUT"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
  
      - name: Run chart-testing (lint) ✅
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .ct.yml --check-version-increment=false --print-config
  
#      - name: Free up disk space 🧹
#        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
#        uses: okdp/gh-workflows/.github/actions/free-disk-space@v1
#
      - name: Get Git Branch Name Action
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
        id: get-branch
        uses: okdp/gh-workflows/.github/actions/git-branch@v1
        with:
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          head_ref: ${{ github.head_ref }}

      - name: Set up kind cluster ✅
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
        uses: okdp/gh-workflows/.github/actions/setup-kind@v1

      - name: Set CI Repo and image tag
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
        env:
          BRANCH: ${{ steps.get-branch.outputs.branch }}
          CI_REGISTRY: ${{ vars.CI_REGISTRY || inputs.ci_registry }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "CI_TAG=$BRANCH" >> $GITHUB_ENV
          echo "REGISTRY_REPO=$CI_REGISTRY/${REPO_OWNER@L}" >> $GITHUB_ENV

      - name: Create CI registry secret 🔐
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
        env:
          CI_REGISTRY: ${{ inputs.ci_registry }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          kubectl create secret docker-registry ci-registry-secret \
            --docker-server="$CI_REGISTRY" \
            --docker-username="$GITHUB_ACTOR" \
            --docker-password="$GITHUB_TOKEN" \
            --docker-email="$GITHUB_ACTOR@users.noreply.github.com" \
            -n default

      - name: Patch default service account with imagePullSecret 🧩
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
        run: |
          echo "🔧 Patching the default ServiceAccount in namespace 'default'..."
          kubectl patch sa default \
            -p '{"imagePullSecrets": [{"name": "ci-registry-secret"}]}' \
            --namespace default
          echo "✅ Default ServiceAccount patched successfully."

      - name: Run chart-testing (install) ✅
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test != 'true'
        env:
          IMAGE: ${{ inputs.image }}
        run: |
          kubectl get events -A -w &
          (while true; do
          echo "**************************************** Pods status ****************************************"
          kubectl get po -A
          sleep 15
          done) &
          ct install --config .ct.yml --namespace default \
             --helm-extra-set-args "--set=superset.image.repository=$REGISTRY_REPO/$IMAGE \
                  --set=superset.image.tag=${CI_TAG} \
                  --set=superset.initImage.repository=$REGISTRY_REPO/$IMAGE \
                  --set=superset.initImage.tag=${CI_TAG}-dockerize \
                  --set=superset.supersetWebsockets.image.repository=$REGISTRY_REPO/$IMAGE \
                  --set=superset.supersetWebsockets.image.tag=${CI_TAG}-websocket" \
             --print-config

      - name: Install helm-docs
        uses: okdp/gh-workflows/.github/actions/helm-docs@v1

      - name: Generate helm docs
        run: |
          echo "Generate docs from charts"
          helm-docs -c .

      - name: Commit helm docs changes
        # Github token from forked repo does not have permission to push to target repo
        # Skip the step for PRs from forked repos
        if: |
            ${{ ((github.event_name == 'push') || (github.event_name == 'pull_request'
                  && github.event.pull_request.head.repo.full_name == github.repository)) }}
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          pull: "--rebase --autostash"
          add: "**/README.md"
          message: '[helm-docs] Update readme'
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
